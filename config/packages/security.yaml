security:
    password_hashers:
        App\Entity\User:
            algorithm: bcrypt
            cost: 16

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false
        main:
            lazy: true
            provider: app_user_provider
            custom_authenticators:
                - App\Security\SessionAuthenticator
            entry_point: App\Security\SessionAuthenticator

    access_control:
