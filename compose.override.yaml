services:
  php:
    build:
      target: php_dev
    environment:
      XDEBUG_MODE: ${XDEBUG_MODE:-debug}
    volumes:
      - ./:/app
      - ./docker/php/conf.d/20-xdebug.ini:/usr/local/etc/php/conf.d/20-xdebug.ini:ro

  nginx:
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./:/app
      - ./docker/nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro

  database:
    ports:
      - "3309:3306"
